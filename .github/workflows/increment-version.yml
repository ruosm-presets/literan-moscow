name: Auto Increment XML Version

on:
  push:
    branches:
      - master
    paths:
      - 'russian_shops.xml'

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Calculate and Update XML Version
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          from datetime import datetime
          import os

          xml_file = 'russian_shops.xml' # Ensure this matches your file name
          
          # Preserve namespaces dynamically so tags don't break
          ET.register_namespace('', 'http://josm.openstreetmap.de/tagging-preset-1.0')
          ET.register_namespace('xsi', 'http://www.w3.org/2001/XMLSchema-instance')

          tree = ET.parse(xml_file)
          root = tree.getroot()

          # 1. Fetch current date in YYYY.MM.DD format
          today_str = datetime.now().strftime('%Y.%m.%d')
          
          # 2. Extract existing version attribute from the root node
          current_version = root.attrib.get('version', '')
          
          # 3. Determine the incremental FIX counter
          # If existing version already matches today's date prefix, increment it
          if current_version.startswith(f'{today_str}_'):
              try:
                  last_fix = int(current_version.split('_')[-1])
                  next_fix = last_fix + 1
              except ValueError:
                  next_fix = 1
          else:
              # It is a brand new day or a legacy format like '2.0_2024-04-24_1'
              next_fix = 1

          # 4. Apply the new version string
          new_version = f'{today_str}_{next_fix}'
          root.attrib['version'] = new_version
          print(f'Updating version from {current_version} to {new_version}')

          # 5. Overwrite the file and preserve the original encoding declaration
          tree.write(xml_file, encoding='utf-8', xml_declaration=True)
          "

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add russian_shops.xml
          
          # [skip ci] prevents this commit from triggering another infinite workflow loop
          git commit -m "chore: increment version to YYYY.MM.DD_FIX [skip ci]" || echo "No changes to commit"
          git push
