name: Auto Increment XML Version

on:
  push:
    branches:
      - master # Triggers on the master branch
    paths:
      - 'russian_shops.xml' # Triggers only when your specific file changes

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update Version String via Regex (Preserves Comments)
        run: |
          python -c "
          import re
          from datetime import datetime

          xml_file = 'russian_shops.xml'

          # 1. Read the raw text of the file exactly as it is
          with open(xml_file, 'r', encoding='utf-8') as f:
              content = f.read()

          # 2. Get today's date in YYYY.MM.DD format
          today_str = datetime.now().strftime('%Y.%m.%d')

          # 3. Find the version attribute using a regular expression
          match = re.search(r'version=\"([^\"]+)\"', content)

          if match:
              current_version = match.group(1)
              
              # Check if the existing version already starts with today's date
              if current_version.startswith(f'{today_str}_'):
                  try:
                      last_fix = int(current_version.split('_')[-1])
                      next_fix = last_fix + 1
                  except ValueError:
                      next_fix = 1
              else:
                  # It's a new day or legacy format
                  next_fix = 1

              new_version = f'{today_str}_{next_fix}'
              
              # 4. Swap only the version string, leaving all comments untouched
              updated_content = content.replace(f'version=\"{current_version}\"', f'version=\"{new_version}\"')
              
              with open(xml_file, 'w', encoding='utf-8') as f:
                  f.write(updated_content)
                  
              print(f'Successfully updated version from {current_version} to {new_version}')
          else:
              print('Warning: version attribute not found in the XML file!')
          "

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add russian_shops.xml
          
          # [skip ci] stops git from running this action again in a loop
          git commit -m "chore: increment version to YYYY.MM.DD_FIX [skip ci]" || echo "No changes to commit"
          git push origin master
